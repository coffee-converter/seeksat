<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISS Pass Finder</title>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Widgets/widgets.css" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./pass-finder.css" />
</head>
<body>
  <!-- Full-page loader covers everything until the initial search has
       rendered + the camera has framed the first pass — prevents the
       awkward pop-in of pins, labels, and panels during boot. JS removes
       this once the first runSearch completes. -->
  <div id="page-loader">
    <svg class="loader-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Wireframe globe: outer circle + a couple of ellipses standing
           in for meridians/parallels. Chunky monochrome strokes, no fill,
           reads as a logo mark. -->
      <g class="loader-globe-wire">
        <circle cx="110" cy="110" r="46" />
        <ellipse cx="110" cy="110" rx="46" ry="16" />
        <ellipse cx="110" cy="110" rx="46" ry="32" />
        <ellipse cx="110" cy="110" rx="22" ry="46" />
        <line x1="110" y1="64" x2="110" y2="156" />
      </g>
      <!-- Orbit trajectory: dashed ring so it reads as a path rather than
           another solid wireframe element. -->
      <circle class="loader-orbit-ring" cx="110" cy="110" r="92" />
      <!-- ISS dot, parked at top of the orbit; the parent <g> rotates
           around the globe center to move it along the orbit. -->
      <g class="loader-iss-group">
        <circle class="loader-iss" cx="110" cy="18" r="5.5" />
      </g>
    </svg>
    <span class="loader-label">Loading pass finder…</span>
  </div>

  <div id="cesium-container"></div>

  <!-- Pane toggle: slides #panel-left off-left when clicked; button tracks
       the panel edge so it's always reachable. -->
  <button id="panel-toggle" type="button" aria-label="Toggle side panel"></button>

  <!-- Single left panel: Observers (collapsible) / Windows (always-visible,
       flex-grows + scrolls) / TLE (collapsible) -->
  <section id="panel-left" class="panel">
    <div id="windows-section">
      <div class="section-heading-row">
        <h2 class="section-heading">Passes</h2>
        <button id="share-btn" type="button" title="Copy a link to this observer setup">Share</button>
      </div>
      <div id="windows-list" class="result-block"><div class="window-empty">loading…</div></div>
    </div>

    <details id="observers-details">
      <summary><h2>Observers</h2></summary>
      <div id="obs-list"></div>
      <div class="add-row">
        <input id="add-latlon" type="text" placeholder="lat, lon (e.g. 42°09'15.9&quot;N, 88°11'59.9&quot;W)" />
        <button id="add-latlon-btn" type="button">Add</button>
      </div>
      <div class="add-row">
        <input id="add-geocode" type="text" placeholder="place name (e.g. Brookfield, WI)" />
        <button id="add-geocode-btn" type="button">Geocode</button>
      </div>
      <button id="click-place-toggle" type="button" class="toggle">Click on globe to place</button>
    </details>

    <details id="tle-details">
      <summary><h2>TLE</h2></summary>
      <div id="tle-status" class="hint">fetching…</div>
      <textarea id="tle-name" placeholder="ISS (ZARYA)"></textarea>
      <textarea id="tle-l1" placeholder="1 25544U ..."></textarea>
      <textarea id="tle-l2" placeholder="2 25544 ..."></textarea>
      <button id="tle-refetch" type="button">Refetch from Celestrak</button>
    </details>
  </section>

  <!-- Single bottom strip: playback + speed + sim-time + camera presets -->
  <nav id="bottom-controls">
    <div class="ctl-group playback">
      <button id="play-btn"  type="button" title="Play">▶</button>
      <button id="pause-btn" type="button" title="Pause">⏸</button>
      <button id="reset-btn" type="button" title="Reset to now">⏮</button>
    </div>
    <label class="speed-label">
      Speed
      <select id="speed-select">
        <option value="1">×1</option>
        <option value="10" selected>×10</option>
        <option value="60">×60</option>
        <option value="600">×600</option>
        <option value="1000">×1000</option>
        <option value="4000">×4000</option>
        <option value="10000">×10000</option>
        <option value="30000">×30000</option>
      </select>
    </label>
    <div id="sim-time">—</div>
    <div id="camera-controls" class="ctl-group">
      <button data-cam="frame" title="Frame all observers">Frame</button>
      <button data-cam="top" title="Top-down view">Top</button>
      <button data-cam="orbit" title="Lock camera to observers' centroid; mouse drag orbits, wheel zooms">Orbit</button>
      <button data-cam="rotate" title="Auto-rotate camera">Rotate</button>
    </div>
  </nav>

  <footer id="credit">ISS Multi-Observer Pass Finder</footer>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Cesium.js"></script>
  <!-- satellite.js v7 is ESM-only and loaded via import in pass-finder.js / truth.js -->
  <script type="module" src="./pass-finder.js"></script>
</body>
</html>
