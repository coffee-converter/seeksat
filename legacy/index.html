<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISS Triangulation</title>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Widgets/widgets.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="cesium-container"></div>

  <!-- Pane toggle: slides #panel-observations off-left when clicked; button
       tracks the panel edge so it's always reachable. Mirrors the
       pass-finder pattern. -->
  <button id="panel-toggle" type="button" aria-label="Toggle side panel"></button>

  <section id="panel-observations" class="panel panel-left">
    <div id="attempt-picker">
      <label for="attempt-select">Attempt</label>
      <select id="attempt-select" title="Switch between triangulation attempts"></select>
      <button id="attempt-new" type="button" title="Create a new attempt">+</button>
      <button id="attempt-download" type="button" hidden title="Download JSON for this attempt">⬇</button>
      <button id="attempt-delete" type="button" hidden title="Delete this attempt (browser-local only)">✕</button>
    </div>
    <!-- Add-attempt form: shown when the + button is clicked. Fields are
         minimum-viable (label, UTC), with an optional checkbox to seed
         the new attempt from the currently-loaded one's observations. -->
    <form id="attempt-new-form" hidden>
      <label class="af-row">
        <span>Label</span>
        <input type="text" id="af-label" placeholder="e.g. Wednesday evening" required />
      </label>
      <label class="af-row">
        <span>UTC</span>
        <input type="text" id="af-utc" placeholder="2026-05-16T22:35:00Z" required />
      </label>
      <label class="af-row af-check">
        <input type="checkbox" id="af-copy" />
        <span>Copy current observations</span>
      </label>
      <div class="af-actions">
        <button type="button" id="af-cancel">Cancel</button>
        <button type="submit" id="af-create">Create</button>
      </div>
    </form>
    <!-- Result blocks sit at the top: triangulated solution + slant
         ranges + residuals + TLE-derived "truth" pose and miss
         distance. Collapsible so the user can hide them while editing
         observations. -->
    <details id="result-section" open>
      <summary><h2>Result</h2></summary>
      <div id="result-triangulated" class="result-block"></div>
      <div id="result-slant" class="result-block"></div>
      <div id="result-residuals" class="result-block"></div>
      <div id="result-truth" class="result-block"></div>
    </details>
    <details id="obs-details" open>
      <summary><h2>Observations</h2></summary>
      <div class="timestamp-row">
        <label>UTC <input id="ts-utc" type="text" /></label>
        <span id="ts-local" class="hint"></span>
      </div>
      <label class="opt-row">
        <input type="checkbox" id="opt-refraction" checked />
        <span>Correct for atmospheric refraction</span>
        <span class="hint">(Bennett 1982)</span>
      </label>
      <div id="obs-list"></div>
      <button id="add-obs" type="button">+ Add observation</button>
    </details>
    <details id="tle-section" open>
      <summary><h2>TLE</h2></summary>
      <div class="tle-actions">
        <button id="tle-fetch" type="button" title="Fetch the current ISS TLE from CelesTrak">Fetch latest</button>
        <button id="tle-clear" type="button" title="Clear all three TLE fields">Clear</button>
        <span id="tle-warn" class="hint" hidden></span>
      </div>
      <textarea id="tle-line1" placeholder="ISS (ZARYA)"></textarea>
      <textarea id="tle-line2" placeholder="1 25544U ..."></textarea>
      <textarea id="tle-line3" placeholder="2 25544 ..."></textarea>
    </details>
    <p class="footnote">Edits auto-save to this browser. Built-in attempts overlay a local override on top of <code>data/</code>; user-created (<code>+</code>) attempts are pure-local. Click <code>⬇</code> to export the current state as a JSON file.</p>
  </section>

  <nav id="camera-controls">
    <!-- Imagery picker lives inside the camera-controls bar so it can't
         collide with the (sometimes-tall) left panel. -->
    <div id="imagery-picker">
      <span class="picker-label">Globe</span>
      <select id="imagery-select"></select>
    </div>
    <button data-cam="frame">Frame all</button>
    <!-- One "From <name>" button per observation, generated dynamically
         from state.observations (renderFromObserverButtons). The slot
         is between Frame and Top so observer buttons sit in the natural
         "frame → from observer → top" reading order. -->
    <span id="from-observer-slot"></span>
    <button data-cam="top">Top down</button>
    <button data-cam="orbit" title="Lock camera to triangulated point; mouse drag orbits, wheel zooms">Orbit point</button>
    <button data-cam="rotate">Auto-rotate</button>
  </nav>

  <div id="sim-time">—</div>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Cesium.js"></script>
  <!-- satellite.js v7 is ESM-only and loaded via import in app.js / truth.js -->
  <script type="module" src="./app.js"></script>
</body>
</html>
